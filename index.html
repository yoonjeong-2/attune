<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>공고 맞춤 이력서 진단</title>

    <!-- 웹폰트: Pretendard(한글) + Poppins(영문·숫자) · 디자인가이드 §2-1 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
    />
    <script>
      // 저장된 테마가 'dark'일 때만 다크 적용 (기본은 라이트 · CLAUDE.md §9·§12). 렌더 전 실행 → 깜빡임 방지.
      try {
        if (localStorage.getItem("theme") === "dark") document.documentElement.classList.add("dark")
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
